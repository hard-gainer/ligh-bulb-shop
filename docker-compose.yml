services:
  auth_db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  order_db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_NAME}
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER} -d ${ORDER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  product_db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POSTGRES_DB: ${PRODUCT_DB_NAME}
    volumes:
      - product_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER} -d ${PRODUCT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTH_DB_HOST: auth_db
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      auth_db:
        condition: service_healthy
    ports:
      - "8001:8000"

  order_service:
    build:
      context: .
      dockerfile: order_service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ORDER_DB_HOST: order_db
      ORDER_DB_USER: ${ORDER_DB_USER}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD}
      ORDER_DB_NAME: ${ORDER_DB_NAME}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      order_db:
        condition: service_healthy
      product_service:
        condition: service_started
    ports:
      - "8002:8000"

  product_service:
    build:
      context: .
      dockerfile: product_service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PRODUCT_DB_HOST: product_db
      PRODUCT_DB_USER: ${PRODUCT_DB_USER}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      PRODUCT_DB_NAME: ${PRODUCT_DB_NAME}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      product_db:
        condition: service_healthy
    ports:
      - "8003:8000"

volumes:
  auth_postgres_data:
  order_postgres_data:
  product_postgres_data:
