services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"

  order_service:
    build:
      context: .
      dockerfile: order_service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8002:8000"

  product_service:
    build:
      context: .
      dockerfile: product_service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8003:8000"

volumes:
  postgres_data:
